<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <filter id="gv">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="400" fill="#0a0a1a"/>
  <text x="400" y="50" text-anchor="middle" fill="#FFE000" font-family="monospace" font-size="24" font-weight="bold" filter="url(#gv)">VIBE CODING</text>
  <text x="400" y="80" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">"Just describe what you want and let AI build it"</text>
  <!-- Human -->
  <g transform="translate(120,130)">
    <circle cx="60" cy="30" r="25" fill="none" stroke="#00ffff" stroke-width="2"/>
    <text x="60" y="35" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="12">DEV</text>
    <line x1="60" y1="55" x2="60" y2="100" stroke="#00ffff" stroke-width="2"/>
    <line x1="60" y1="70" x2="30" y2="90" stroke="#00ffff" stroke-width="2"/>
    <line x1="60" y1="70" x2="90" y2="90" stroke="#00ffff" stroke-width="2"/>
    <line x1="60" y1="100" x2="40" y2="130" stroke="#00ffff" stroke-width="2"/>
    <line x1="60" y1="100" x2="80" y2="130" stroke="#00ffff" stroke-width="2"/>
    <text x="60" y="160" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="10">IDEA</text>
    <text x="60" y="175" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="10">DIRECTION</text>
    <text x="60" y="190" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="10">FEEDBACK</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(280,180)">
    <text x="0" y="0" fill="#FFE000" font-family="monospace" font-size="30">===></text>
    <text x="30" y="25" fill="#888" font-family="monospace" font-size="9">prompt</text>
  </g>
  <!-- AI -->
  <g transform="translate(400,130)">
    <rect x="10" y="10" width="120" height="80" rx="10" fill="none" stroke="#ff00ff" stroke-width="2"/>
    <text x="70" y="45" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="14" font-weight="bold">CLAUDE</text>
    <text x="70" y="65" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="11">CODE</text>
    <text x="70" y="115" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="10">PLAN</text>
    <text x="70" y="130" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="10">IMPLEMENT</text>
    <text x="70" y="145" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="10">DEBUG</text>
    <text x="70" y="160" text-anchor="middle" fill="#ff00ff" font-family="monospace" font-size="10">TEST</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(570,180)">
    <text x="0" y="0" fill="#FFE000" font-family="monospace" font-size="30">===></text>
    <text x="25" y="25" fill="#888" font-family="monospace" font-size="9">output</text>
  </g>
  <!-- Result -->
  <g transform="translate(640,120)">
    <rect x="0" y="0" width="130" height="170" rx="8" fill="#000" stroke="#00ff88" stroke-width="2"/>
    <text x="65" y="25" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="12" font-weight="bold">WORKING</text>
    <text x="65" y="42" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="12" font-weight="bold">GAME</text>
    <rect x="20" y="55" width="90" height="60" rx="4" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="45" cy="85" r="6" fill="#ff0055"/>
    <circle cx="70" cy="90" r="8" fill="#ff9900"/>
    <circle cx="55" cy="100" r="5" fill="#cc00ff"/>
    <text x="65" y="135" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">Physics</text>
    <text x="65" y="148" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">Mobile</text>
    <text x="65" y="161" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">Arcade UI</text>
  </g>
</svg>