  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070d;
      font-family: 'Pretendard', system-ui, sans-serif;
      color: #f5f7ff;
    }
    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top right, rgba(79,125,255,0.14), transparent 30%),
        radial-gradient(circle at bottom left, rgba(103,213,255,0.08), transparent 25%),
        linear-gradient(180deg, #070b14 0%, #04060c 100%);
    }
    .bar {
      height: 52px;
      border-bottom: 1px solid rgba(122,154,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      background: rgba(4,6,12,0.82);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .brand {
      position: absolute;
      left: 16px;
      font-size: 11px;
      color: #86a7ff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .bar button {
      border: 1px solid rgba(122,154,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #f5f7ff;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    .bar button:hover { background: rgba(255,255,255,0.08); }
    .bar button:disabled { opacity: 0.3; cursor: default; }
    .counter {
      min-width: 64px;
      text-align: center;
      color: #9aa7c7;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .fs {
      position: absolute;
      right: 16px;
    }
    .viewport {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 16px;
    }
    .scaler {
      width: 720px;
      height: 405px;
      position: relative;
      transform-origin: center center;
    }
    .slide-frame {
      position: absolute;
      inset: 0;
      width: 720px;
      height: 405px;
      border: none;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.35);
    }
    .slide-frame.active {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>

        <iframe class="slide-frame" data-slide="58" src="./slide-58.html" loading="lazy" allowfullscreen></iframe>
      </div>
    </div>
  </div>
  <script>
    const TOTAL = 58;
    let current = 1;
    const frames = Array.from(document.querySelectorAll('.slide-frame'));
    const counter = document.getElementById('counter');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const scaler = document.getElementById('scaler');
    const viewport = document.getElementById('viewport');

    function render() {
      frames.forEach((frame, index) => frame.classList.toggle('active', index === current - 1));
      counter.textContent = current + ' / ' + TOTAL;
      prev.disabled = current === 1;
      next.disabled = current === TOTAL;
    }

    function goTo(index) {
      current = Math.max(1, Math.min(TOTAL, index));
      render();
    }

    function rescale() {
      const scale = Math.min(viewport.clientWidth / 720, viewport.clientHeight / 405) * 0.98;
      scaler.style.transform = 'scale(' + scale + ')';
    }

    prev.addEventListener('click', () => goTo(current - 1));
    next.addEventListener('click', () => goTo(current + 1));
    document.getElementById('fs').addEventListener('click', async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(() => {});
      else await document.exitFullscreen().catch(() => {});
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === ' ') {
        event.preventDefault();
        goTo(current + 1);
      } else if (event.key === 'ArrowLeft') {
        event.preventDefault();
        goTo(current - 1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        goTo(1);
      } else if (event.key === 'End') {
        event.preventDefault();
        goTo(TOTAL);
      } else if (event.key.toLowerCase() === 'f') {
        event.preventDefault();
        document.getElementById('fs').click();
      }
    });

    window.addEventListener('resize', rescale);
    document.addEventListener('fullscreenchange', () => setTimeout(rescale, 50));
    render();
    rescale();
  </script>
</body>
