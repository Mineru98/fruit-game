<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>45. 아케이드 리디자인은 미화가 아니었습니다</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">Redesign</div>
      <h1 class="title">아케이드 리디자인은 미화가 아니었습니다</h1>
      <p class="subtitle">검정 배경과 네온 팔레트는 제품의 첫 인상을 다시 설계한 장치였습니다.</p>
    </div>
    <div class="page">45</div>
  </div>
  <main class="content">
      <div class="grid-2" style="grid-template-columns: 1.18fr 0.82fr;">
        <div class="image-frame image-contain">
          <img src="./assets/arcade-palette.svg" alt="Arcade palette">
        </div>
        <div class="card">
          <h3>핵심 판단</h3>
          <p><strong>리디자인의 목적은 예쁘게 꾸미는 것이 아니라, 제품 인상을 바꾸는 것이었습니다.</strong></p>
          <ul>
            <li>기능 중심 데모에서 기억에 남는 경험으로 이동</li>
            <li>발표에서 보여줄 가치가 생김</li>
            <li>리디자인도 문서와 계획을 먼저 만든 뒤 실행</li>
          </ul>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>ITERATION · 2026년 4월 17일</div>
  </div>

</body>
</html>
