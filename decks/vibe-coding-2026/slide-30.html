<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>30. 전환점은 설명 영상이었습니다</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">Turning point</div>
      <h1 class="title">전환점은 설명 영상이었습니다</h1>
      <p class="subtitle">결과보다 원리를 설명하는 자료를 만났을 때, AI에게 줄 수 있는 가이드라인이 생겼습니다.</p>
    </div>
    <div class="page">30</div>
  </div>
  <main class="content">
      <div class="grid-2" style="grid-template-columns: 1.3fr 0.7fr; align-items: stretch;">
        <div style="display:grid; grid-template-rows: auto 1fr; gap:6px; min-height:0;">
          <div class="badge-row">
            <span class="badge">VIDEO</span>
            <span class="badge">SCRIPT → GUIDE</span>
          </div>
          <div class="video-frame">
            <video src="./assets/miniflex.mp4" poster="./assets/miniflex-poster.png" controls muted playsinline preload="auto" style="width:100%; height:100%; object-fit:contain;"></video>
          </div>
        </div>
        <div class="stack" style="gap: 6px; height: 100%; justify-content: space-between;">
          <div class="card" style="padding: 8px 10px;">
            <h3 style="font-size: 14px;">왜 이 영상이 달랐나</h3>
            <p class="quote" style="margin-bottom: 8px; font-size: 14px;">결과가 아니라 원리를 설명하는 자료였습니다.</p>
            <ul style="font-size: 13px;">
              <li>중력을 어떻게 표현하는지</li>
              <li>충돌을 어떻게 판단하는지</li>
              <li>물리적으로 어떤 가정을 쓰는지</li>
            </ul>
          </div>
          <div class="callout" style="padding: 8px 10px;">
            <p style="font-size: 13px;">영상 스크립트를 정리한 뒤, 그걸 Opus에게 넘겨 과일 게임 가이드 문서로 바꿨습니다.</p>
          </div>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>FRUIT GAME · 2026년 4월 17일</div>
  </div>

</body>
</html>
