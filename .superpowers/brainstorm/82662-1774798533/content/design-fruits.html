<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a1a; color:#fff; font-family:'Press Start 2P',monospace; padding:24px; }
  h1 { color:#00ffff; font-size:11px; letter-spacing:3px; text-shadow:0 0 10px #00ffff; text-align:center; margin-bottom:4px; }
  .sub { color:#555; font-size:7px; font-family:monospace; text-align:center; margin-bottom:24px; }
  .grid {
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap:16px;
    max-width:720px;
    margin:0 auto 32px;
  }
  .fruit-cell {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:#050510; border:1px solid #1a1a2e; border-radius:6px; padding:12px 8px;
    transition: border-color .2s;
  }
  .fruit-cell:hover { border-color:#00ffff44; }
  .fruit-label { color:#555; font-size:6px; letter-spacing:1px; }
  .fruit-name  { color:#888; font-size:6px; font-family:monospace; }

  .compare {
    max-width:720px; margin:0 auto;
    background:#050510; border:1px solid #1a1a2e; border-radius:8px; padding:16px;
  }
  .compare-title { color:#ff00ff; font-size:8px; letter-spacing:2px; margin-bottom:12px; }
  .compare-row { display:flex; align-items:center; gap:20px; margin-bottom:16px; }
  .compare-label { color:#555; font-size:7px; font-family:monospace; width:80px; flex-shrink:0; }
  .compare-fruits { display:flex; gap:8px; align-items:center; }
</style>
</head>
