<!DOCTYPE html>
<html lang="ko">
<head>

  <title>55. 그래서 바이브 코딩에서 손이 가야 하는 위치가 바뀝니다</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">What changed</div>
      <h1 class="title">그래서 바이브 코딩에서 손이 가야 하는 위치가 바뀝니다</h1>
      <p class="subtitle">핵심은 손을 안 대는 게 아니라, 손이 키보드 코드 입력에서 문서와 검증, 오케스트레이션으로 이동한다는 점입니다.</p>
    </div>
    <div class="page">55</div>
  </div>
  <main class="content">
      <div class="compare">
        <div class="bad">
          <h3>예전의 손</h3>
          <ul>
            <li>코드를 직접 친다</li>
            <li>구현 세부를 직접 관리한다</li>
            <li>테스트와 리뷰도 같은 머리로 처리한다</li>
          </ul>
        </div>
        <div class="good">
          <h3>지금의 손</h3>
          <ul>
            <li>문서를 만든다</li>
            <li>검증 기준을 정한다</li>
            <li>역할을 나누고 작업을 오케스트레이션한다</li>
          </ul>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
