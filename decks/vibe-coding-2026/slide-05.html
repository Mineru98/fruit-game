<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>5. 같은 메시지를 한국어로 다시 읽었을 때 더 명확해진 것</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">Spark</div>
      <h1 class="title">같은 메시지를 한국어로 다시 읽었을 때 더 명확해진 것</h1>
      <p class="subtitle">핵심은 프롬프트 문장력이 아니라, AI에게 일을 맡기는 방식 자체였습니다.</p>
    </div>
    <div class="page">05</div>
  </div>
  <main class="content">
      <div class="grid-2">
        <div class="image-frame image-contain">
          <img src="./assets/vibe-coding-twitter-ko.png" alt="Andrej Karpathy vibe coding tweet in Korean">
        </div>
        <div class="stack">
          <div class="card">
            <h3>제가 받아들인 번역</h3>
            <p class="quote" style="font-size:16px;">“AI에게 코딩을 시킨다”는 건<br><span class="accent">직접 타이핑을 안 한다</span>가 아니라,<br><span class="accent2">일을 위임하고 통제한다</span>에 가깝다.</p>
          </div>
          <div class="metric-grid" style="grid-template-columns:repeat(2,1fr);">
            <div class="metric"><div class="label">keyword</div><div class="value">2025.02</div><div class="hint">용어를 처음 강하게 의식한 시점</div></div>
            <div class="metric"><div class="label">shift</div><div class="value" style="font-size:13px;line-height:1.2;margin-top:6px;">Coder → Director</div><div class="hint">역할 이동</div></div>
          </div>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>OPENING · 2026년 4월 17일</div>
  </div>

</body>
</html>
