<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>33. 처음부터 “돌아가는 척하는 프로토타입”은 아니었습니다</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">Version 1 proof</div>
      <h1 class="title">처음부터 “돌아가는 척하는 프로토타입”은 아니었습니다</h1>
      <p class="subtitle">물리적으로 설명 가능한 게임이 나왔고, 이 단계에서만도 Jest 단위 테스트 51개를 통과했습니다.</p>
    </div>
    <div class="page">33</div>
  </div>
  <main class="content">
      <div class="grid-2">
        <div class="image-frame image-contain">
          <img src="./assets/physics-diagram.svg" alt="Physics diagram">
        </div>
        <div class="stack">
          <div class="metric-grid">
            <div class="metric"><div class="label">tests</div><div class="value">51</div><div class="hint">초기 단계 Jest 단위 테스트</div></div>
            <div class="metric"><div class="label">core</div><div class="value">Physics</div><div class="hint">중력 · 마찰 · 충돌 분리</div></div>
          </div>
          <div class="card">
            <h3>이 단계의 의미</h3>
            <p>제가 직접 한 줄 한 줄 구현하지 않았더라도, 무엇을 검증해야 하는지와 어떤 단위로 쪼개야 하는지를 문서로 던졌기 때문에 가능한 결과였습니다.</p>
          </div>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>FRUIT GAME · 2026년 4월 17일</div>
  </div>

</body>
</html>
