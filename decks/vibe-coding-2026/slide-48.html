<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>48. 결과는 숫자로 더 선명해집니다</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">Result</div>
      <h1 class="title">결과는 숫자로 더 선명해집니다</h1>
      <p class="subtitle">도메인 선정부터 리디자인까지, 한 공정으로 밀도 있게 돌아갔습니다.</p>
    </div>
    <div class="page">48</div>
  </div>
  <main class="content">
      <div class="stack" style="height: 100%; gap: 10px;">
        <div class="callout">
          <p><strong>핵심 해석:</strong> 속도를 자랑하는 숫자보다, 설계-구현-검증-개선이 한 공정으로 묶였다는 점이 더 중요합니다.</p>
        </div>
        <div class="metric-grid" style="grid-template-columns: 1.25fr 0.85fr 0.85fr;">
          <div class="metric" style="grid-row: span 2; min-height: 100%; background: linear-gradient(180deg, rgba(26,38,67,0.98), rgba(10,14,24,0.98)); border-color: rgba(103,213,255,0.34);">
            <div class="label">commits</div>
            <div class="value">22</div>
            <div class="hint">짧은 기간 내 누적 기록</div>
          </div>
          <div class="metric"><div class="label">sessions</div><div class="value">10</div><div class="hint">개발 세션</div></div>
          <div class="metric"><div class="label">duration</div><div class="value">2일</div><div class="hint">집중 제작 기간</div></div>
          <div class="metric"><div class="label">manual code</div><div class="value">0줄</div><div class="hint">직접 입력한 코드 기준</div></div>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>ITERATION · 2026년 4월 17일</div>
  </div>

</body>
</html>
