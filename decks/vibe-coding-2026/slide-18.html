<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>18. Claude Code의 핵심 구성 요소 한 장 요약</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">System map</div>
      <h1 class="title">Claude Code의 핵심 구성 요소 한 장 요약</h1>
      <p class="subtitle">이 발표의 관점에서 중요한 건 개념 암기가 아니라, 어디에 어떻게 써야 하는지입니다.</p>
    </div>
    <div class="page">18</div>
  </div>
  <main class="content">
      <div class="stack" style="height:100%; gap:6px;">
        <div class="visual-card contain pulse" style="flex:1.95; min-height:0;">
          <img src="./assets/claude-components-board.svg" alt="Claude Code components board" style="width:100%; height:100%; object-fit:contain; padding:2px;">
        </div>
        <div class="card" style="flex:0.35; min-height:0; padding:8px 10px;">
          <h3>핵심 해석</h3>
          <p style="margin-bottom:6px;">중요한 건 개념을 외우는 일이 아니라, 긴 프로젝트에서 각 기능에 어떤 역할을 맡길지 설계하는 일입니다.</p>
          <div class="chip-strip" style="margin-top:6px;">
            <span class="chip">Memory</span>
            <span class="chip">MCP</span>
            <span class="chip">Hooks</span>
            <span class="chip">Subagents</span>
          </div>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>CLAUDE CODE · 2026년 4월 17일</div>
  </div>

</body>
</html>
