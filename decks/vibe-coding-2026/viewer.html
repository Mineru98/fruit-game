<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>바이브 코딩, 문서화, 그리고 Harness Engineering</title>
  <link rel="icon" href="./assets/vibe-coding-twitter-ko.png">
  <link rel="preload" href="./theme.css" as="style">
  <link rel="preload" href="./slide-01.html" as="document">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070d;
      font-family: 'Pretendard', system-ui, sans-serif;
      color: #f5f7ff;
    }
    .app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at top right, rgba(79,125,255,0.14), transparent 30%),
        radial-gradient(circle at bottom left, rgba(103,213,255,0.08), transparent 25%),
        linear-gradient(180deg, #070b14 0%, #04060c 100%);
    }
    .bar {
      height: 52px;
      border-bottom: 1px solid rgba(122,154,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      background: rgba(4,6,12,0.82);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .brand {
      position: absolute;
      left: 16px;
      font-size: 11px;
      color: #86a7ff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .bar button {
      border: 1px solid rgba(122,154,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #f5f7ff;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    .bar button:hover { background: rgba(255,255,255,0.08); }
    .bar button:disabled { opacity: 0.3; cursor: default; }
    .counter {
      min-width: 64px;
      text-align: center;
      color: #9aa7c7;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
    .fs {
      position: absolute;
      right: 16px;
    }
    .viewport {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 16px;
    }
    .scaler {
      width: 720px;
      height: 405px;
      position: relative;
      transform-origin: center center;
      background: #000;
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0,0,0,0.35);
    }
    .slide-frame {
      position: absolute;
      inset: 0;
      width: 720px;
      height: 405px;
      border: none;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      border-radius: 16px;
    }
    .slide-frame.active {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      color: #86a7ff;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      z-index: 2;
      background: #05070d;
      border-radius: 16px;
    }
    .spinner.visible { display: flex; }
    .spinner::before {
      content: '';
      width: 14px;
      height: 14px;
      border: 2px solid rgba(134,167,255,0.25);
      border-top-color: #67d5ff;
      border-radius: 50%;
      margin-right: 8px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div class="bar">
      <div class="brand">임근석 · 쓸모랩 · 우리기획</div>
      <button id="prev">Prev</button>
      <div class="counter" id="counter">1 / 74</div>
      <button id="next">Next</button>
      <button class="fs" id="fs">Fullscreen</button>
    </div>
    <div class="viewport" id="viewport">
      <div class="scaler" id="scaler">
        <div class="spinner" id="spinner">Loading</div>
      </div>
    </div>
  </div>
  <script>
    const TOTAL = 74;
    const AUTOPLAY_SLIDES = new Set([28, 30, 56, 58]);
    const PRELOAD_AHEAD = 1;
    const PRELOAD_BEHIND = 1;
    const scaler = document.getElementById('scaler');
    const viewport = document.getElementById('viewport');
    const counter = document.getElementById('counter');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const spinner = document.getElementById('spinner');

    const frames = new Array(TOTAL + 1);
    const loaded = new Set();

    function pad(n) { return String(n).padStart(2, '0'); }
    function slideUrl(n) { return './slide-' + pad(n) + '.html'; }

    function ensureFrame(n) {
      if (frames[n]) return frames[n];
      const frame = document.createElement('iframe');
      frame.className = 'slide-frame';
      frame.dataset.slide = String(n);
      frame.setAttribute('allowfullscreen', '');
      if (AUTOPLAY_SLIDES.has(n)) frame.setAttribute('allow', 'autoplay');
      frame.addEventListener('load', () => {
        loaded.add(n);
        if (n === current) spinner.classList.remove('visible');
      });
      frame.src = slideUrl(n);
      scaler.appendChild(frame);
      frames[n] = frame;
      return frame;
    }

    function preloadAround(n) {
      ensureFrame(n);
      for (let i = 1; i <= PRELOAD_AHEAD; i++) {
        if (n + i <= TOTAL) ensureFrame(n + i);
      }
      for (let i = 1; i <= PRELOAD_BEHIND; i++) {
        if (n - i >= 1) ensureFrame(n - i);
      }
    }

    let current = 1;

    function render() {
      preloadAround(current);
      for (let i = 1; i <= TOTAL; i++) {
        const frame = frames[i];
        if (!frame) continue;
        frame.classList.toggle('active', i === current);
      }
      spinner.classList.toggle('visible', !loaded.has(current));
      counter.textContent = current + ' / ' + TOTAL;
      prev.disabled = current === 1;
      next.disabled = current === TOTAL;
    }

    function goTo(index) {
      current = Math.max(1, Math.min(TOTAL, index));
      render();
    }

    function rescale() {
      const scale = Math.min(viewport.clientWidth / 720, viewport.clientHeight / 405) * 0.98;
      scaler.style.transform = 'scale(' + scale + ')';
    }

    prev.addEventListener('click', () => goTo(current - 1));
    next.addEventListener('click', () => goTo(current + 1));
    document.getElementById('fs').addEventListener('click', async () => {
      if (!document.fullscreenElement) await document.documentElement.requestFullscreen().catch(() => {});
      else await document.exitFullscreen().catch(() => {});
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === ' ') {
        event.preventDefault();
        goTo(current + 1);
      } else if (event.key === 'ArrowLeft') {
        event.preventDefault();
        goTo(current - 1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        goTo(1);
      } else if (event.key === 'End') {
        event.preventDefault();
        goTo(TOTAL);
      } else if (event.key.toLowerCase() === 'f') {
        event.preventDefault();
        document.getElementById('fs').click();
      }
    });

    window.addEventListener('resize', rescale);
    document.addEventListener('fullscreenchange', () => setTimeout(rescale, 50));

    render();
    rescale();

    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => {
        for (let i = 1; i <= Math.min(TOTAL, 5); i++) ensureFrame(i);
      }, { timeout: 1500 });
    }
  </script>
</body>
</html>
