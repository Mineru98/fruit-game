<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./theme.css">
  <title>18. Claude Code의 핵심 구성 요소 한 장 요약</title>
</head>
<body>
  <div class="noise"></div>
  <div class="header">
    <div>
      <div class="eyebrow">System map</div>
      <h1 class="title">Claude Code의 핵심 구성 요소 한 장 요약</h1>
      <p class="subtitle">이 발표의 관점에서 중요한 건 개념 암기가 아니라, 어디에 어떻게 써야 하는지입니다.</p>
    </div>
    <div class="page">18</div>
  </div>
  <main class="content">
      <div class="diagram-panel">
        <div class="visual-col">
          <div class="visual-card contain pulse">
            <img src="./assets/claude-components-board.svg" alt="Claude Code components board">
          </div>
        </div>
        <div class="text-col">
          <div class="card"><h3>핵심 해석</h3><p>이 발표의 관점에서 중요한 건 개념 암기가 아니라, 어디에 어떤 역할을 맡겨야 긴 프로젝트가 흔들리지 않는지입니다.</p></div>
          <div class="chip-strip">
            <span class="chip">Memory</span>
            <span class="chip">MCP</span>
            <span class="chip">Hooks</span>
            <span class="chip">Subagents</span>
            <span class="chip">Skills</span>
            <span class="chip">Teams</span>
          </div>
        </div>
      </div>
    </main>
  
  <div class="footer">
    <div>임근석 · <strong>쓸모랩 · 우리기획</strong></div>
    <div>CLAUDE CODE · 2026년 4월 17일</div>
  </div>

</body>
</html>
