<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="g1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#08081a"/>

  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#00ffff" stroke-width="1">
    <line x1="0" y1="530" x2="1200" y2="530"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="590" x2="1200" y2="590"/>
    <line x1="0" y1="620" x2="1200" y2="620"/>
  </g>

  <!-- Neon border -->
  <rect x="14" y="14" width="1172" height="602" fill="none" stroke="#00ffff" stroke-width="2" rx="2" filter="url(#g1)" opacity="0.4"/>

  <!-- ===== FRUITS ROW (centered, large) ===== -->

  <!-- Cherry -->
  <g transform="translate(115,260) scale(8)" shape-rendering="crispEdges">
    <rect x="4" y="0" width="1" height="3" fill="#3d2000"/>
    <rect x="7" y="0" width="1" height="3" fill="#3d2000"/>
    <rect x="3" y="1" width="4" height="1" fill="#3d2000"/>
    <rect x="2" y="4" width="1" height="4" fill="#ff0055"/>
    <rect x="3" y="3" width="2" height="6" fill="#ff0055"/>
    <rect x="5" y="4" width="1" height="4" fill="#ff0055"/>
    <rect x="6" y="4" width="1" height="4" fill="#cc0044"/>
    <rect x="7" y="3" width="2" height="6" fill="#cc0044"/>
    <rect x="9" y="4" width="1" height="4" fill="#cc0044"/>
    <rect x="3" y="4" width="1" height="1" fill="#ff6688"/>
    <rect x="7" y="4" width="1" height="1" fill="#ff6688"/>
  </g>

  <!-- Grape -->
  <g transform="translate(270,275) scale(7.5)" shape-rendering="crispEdges">
    <rect x="5" y="0" width="2" height="2" fill="#00aa33"/>
    <rect x="2" y="2" width="3" height="3" fill="#cc00ff"/>
    <rect x="7" y="2" width="3" height="3" fill="#aa00dd"/>
    <rect x="1" y="5" width="3" height="3" fill="#aa00dd"/>
    <rect x="4" y="5" width="4" height="3" fill="#cc00ff"/>
    <rect x="8" y="5" width="3" height="3" fill="#9900bb"/>
    <rect x="3" y="8" width="3" height="3" fill="#9900bb"/>
    <rect x="6" y="8" width="3" height="3" fill="#cc00ff"/>
    <rect x="2" y="2" width="1" height="1" fill="#ee44ff"/>
    <rect x="7" y="2" width="1" height="1" fill="#ee44ff"/>
  </g>

  <!-- Dekopon (orange) -->
  <g transform="translate(430,270) scale(7.5)" shape-rendering="crispEdges">
    <rect x="4" y="0" width="4" height="2" fill="#ff9900"/>
    <rect x="5" y="0" width="1" height="1" fill="#00aa33"/>
    <rect x="1" y="2" width="10" height="1" fill="#ff9900"/>
    <rect x="0" y="3" width="12" height="6" fill="#ff9900"/>
    <rect x="1" y="9" width="10" height="1" fill="#ff9900"/>
    <rect x="2" y="10" width="8" height="1" fill="#ff9900"/>
    <rect x="4" y="11" width="4" height="1" fill="#ff9900"/>
    <rect x="1" y="3" width="2" height="2" fill="#ffbb33"/>
    <rect x="7" y="4" width="2" height="2" fill="#ffbb33"/>
  </g>

  <!-- Apple -->
  <g transform="translate(770,270) scale(7.5)" shape-rendering="crispEdges">
    <rect x="5" y="0" width="2" height="2" fill="#3d2000"/>
    <rect x="7" y="1" width="3" height="2" fill="#00aa33"/>
    <rect x="1" y="2" width="10" height="1" fill="#ee1111"/>
    <rect x="0" y="3" width="5" height="7" fill="#ee1111"/>
    <rect x="7" y="3" width="5" height="7" fill="#ee1111"/>
    <rect x="5" y="3" width="2" height="9" fill="#cc1100"/>
    <rect x="1" y="10" width="4" height="1" fill="#ee1111"/>
    <rect x="7" y="10" width="4" height="1" fill="#ee1111"/>
    <rect x="2" y="11" width="8" height="1" fill="#ee1111"/>
    <rect x="1" y="3" width="2" height="3" fill="#ff4444"/>
  </g>

  <!-- Watermelon (biggest) -->
  <g transform="translate(920,240) scale(8)" shape-rendering="crispEdges">
    <rect x="4" y="0" width="8" height="1" fill="#005500"/>
    <rect x="2" y="1" width="12" height="2" fill="#007700"/>
    <rect x="1" y="3" width="14" height="10" fill="#009900"/>
    <rect x="2" y="13" width="12" height="2" fill="#007700"/>
    <rect x="4" y="15" width="8" height="1" fill="#005500"/>
    <rect x="2" y="4" width="12" height="8" fill="#ff1155"/>
    <rect x="1" y="5" width="1" height="6" fill="#ff1155"/>
    <rect x="14" y="5" width="1" height="6" fill="#ff1155"/>
    <rect x="3" y="1" width="2" height="3" fill="#00bb00"/>
    <rect x="7" y="1" width="2" height="3" fill="#00aa00"/>
    <rect x="11" y="1" width="2" height="3" fill="#00bb00"/>
    <rect x="4" y="7" width="2" height="2" fill="#111"/>
    <rect x="8" y="6" width="2" height="2" fill="#111"/>
    <rect x="11" y="9" width="2" height="2" fill="#111"/>
    <rect x="2" y="4" width="2" height="2" fill="#ff4477"/>
  </g>

  <!-- Merge arrows between fruits -->
  <g fill="#00ffff" opacity="0.3" filter="url(#g1)">
    <polygon points="250,340 260,330 260,350"/>
    <polygon points="410,340 420,330 420,350"/>
    <polygon points="750,340 760,330 760,350"/>
    <polygon points="900,340 910,330 910,350"/>
  </g>

  <!-- ===== TEXT ===== -->

  <!-- Title -->
  <text x="600" y="110" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="90" fill="#FFE000" filter="url(#g3)" letter-spacing="8">FRUIT GAME</text>

  <!-- VIBE CODED badge -->
  <rect x="380" y="140" width="440" height="48" rx="4" fill="#ff00ff15" stroke="#ff00ff" stroke-width="2" filter="url(#g2)" opacity="0.9"/>
  <text x="600" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="24" fill="#ff00ff" filter="url(#g1)" letter-spacing="6">VIBE CODED ARCADE</text>

  <!-- Bottom tagline -->
  <text x="600" y="500" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#00ffff" filter="url(#g1)" letter-spacing="3">8-BIT PIXEL PUZZLE</text>

  <text x="600" y="545" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#ff005599" letter-spacing="8">DROP  ·  MATCH  ·  MERGE</text>

  <!-- Corner HUD -->
  <text x="45" y="44" font-family="'Courier New', monospace" font-size="13" fill="#00ffff" filter="url(#g1)" opacity="0.5" letter-spacing="2">1UP</text>
  <text x="1155" y="44" font-family="'Courier New', monospace" font-size="13" fill="#ff00ff" filter="url(#g1)" opacity="0.5" text-anchor="end" letter-spacing="2">HI SCORE</text>
</svg>
