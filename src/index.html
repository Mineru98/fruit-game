<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="game-title">Fruit Game</div>
      <div class="score-board">Score: <span id="scoreValue">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div class="controls-text">
      <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Move &nbsp;&nbsp; <kbd>Space</kbd> Drop
    </div>
  </div>
  <script src="Fruit.js"></script>
  <script src="Physics.js"></script>
  <script src="CollisionDetector.js"></script>
  <script src="GameState.js"></script>
  <script src="InputHandler.js"></script>
  <script src="Game.js"></script>
  <script>
    // Ensure all dependencies are loaded before creating the game
    if (typeof Game === 'undefined') {
      console.error('Game class not defined. Check script loading order.');
    } else {
      try {
        const game = new Game('gameCanvas');
        // Expose game globally for Playwright E2E testing
        window.game = game;
        game.start();

        // Restart on spacebar when game is over
        document.addEventListener('keydown', (e) => {
          if (e.key === ' ' && game.gameState.isGameOver) {
            game.stop();
            game.start();
            e.preventDefault();
          }
        });
      } catch (err) {
        console.error('Failed to initialize game:', err);
      }
    }
  </script>
</body>
</html>
